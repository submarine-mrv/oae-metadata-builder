[build]
  command = "npm run build"
  publish = "dist"

# Vite 7 requires Node >= 20.19; pin so Netlify doesn't build on an older default.
[build.environment]
  NODE_VERSION = "20.19.0"

# SPA fallback: client-side routes (e.g. /project) must serve index.html on refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
